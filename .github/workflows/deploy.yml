    - uses: actions/checkout@v4
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.7.5
    - name: Terraform Init
      run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
        -backend-config="key=myshortner02/terraform.tfstate" -backend-config="region=us-east-1"
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    - name: Terraform Apply
      run: terraform apply -auto-approve -var="db_password=${{ secrets.DB_PASSWORD
        }}" -var="project_name=${{ secrets.PROJECT_NAME }}"
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    - name: Capture Outputs
      run: 'echo "ec2_ip=$(terraform output -raw ec2_public_ip)" >> "$GITHUB_OUTPUT"

        echo "rds_endpoint=$(terraform output -raw rds_endpoint)" >> "$GITHUB_OUTPUT"

        '
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  configure:
    runs-on: ubuntu-latest
    needs:
    - provision
    steps:
    - uses: actions/checkout@v4
    - name: Install Ansible
      run: pip install ansible
    - name: Write SSH key
      run: 'echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key

        chmod 600 /tmp/deploy_key

        '
    - name: Scan host key
      run: ssh-keyscan -H ${{ needs.provision.outputs.ec2_ip }} >> ~/.ssh/known_hosts
    - name: Run Ansible playbook
      run: "ansible-playbook -i \"${{ needs.provision.outputs.ec2_ip }},\" \\\n  --private-key\
