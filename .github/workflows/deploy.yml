# Auto-rendered from .udap/pipeline.yaml — do not edit directly
name: myshortner02

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: flake8 app/ --max-line-length=120 --exclude=app/migrations

  provision:
    runs-on: ubuntu-latest
    needs: [lint]
    outputs:
      ec2_ip: ${{ steps.tf_outputs.outputs.ec2_ip }}
      ec2_id: ${{ steps.tf_outputs.outputs.ec2_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
      - name: Terraform Init
        run: terraform init -reconfigure -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" -backend-config="key=myshortner02/terraform.tfstate" -backend-config="region=us-east-1"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        working-directory: infra
      - name: Import existing resources
        run: |
          chmod +x import_existing.sh
          bash import_existing.sh "${{ secrets.PROJECT_NAME }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          TF_VAR_project_name: ${{ secrets.PROJECT_NAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        working-directory: infra
      - name: Terraform Apply
        run: terraform apply -auto-approve -var="db_password=${{ secrets.DB_PASSWORD }}" -var="project_name=${{ secrets.PROJECT_NAME }}" -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        working-directory: infra
      - name: Capture Outputs
        id: tf_outputs
        run: |
          EC2_IP=$(terraform output -json | jq -r '.ec2_public_ip.value')
          EC2_ID=$(terraform output -json | jq -r '.ec2_instance_id.value')
          RDS_EP=$(terraform output -json | jq -r '.rds_endpoint.value')
          echo "ec2_ip=${EC2_IP}" >> "$GITHUB_OUTPUT"
          echo "ec2_id=${EC2_ID}" >> "$GITHUB_OUTPUT"
          # Write RDS endpoint to artifact file — GitHub masks job outputs
          # that contain substrings matching registered secrets.
          echo -n "${RDS_EP}" > /tmp/rds_endpoint.txt
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        working-directory: infra
      - name: Upload RDS endpoint artifact
        uses: actions/upload-artifact@v4
        with:
          name: rds-endpoint
          path: /tmp/rds_endpoint.txt
          retention-days: 1

  configure:
    runs-on: ubuntu-latest
    needs: [provision]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Ansible
        run: pip install ansible
      - name: Download RDS endpoint artifact
        uses: actions/download-artifact@v4
        with:
          name: rds-endpoint
          path: /tmp
      - name: Inject SSH public key via SSM
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          INSTANCE_ID="${{ needs.provision.outputs.ec2_id }}"
          echo "Injecting SSH public key into instance $INSTANCE_ID via SSM"

          for i in $(seq 1 20); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${INSTANCE_ID}" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null || echo "")
            echo "  SSM ping status: $STATUS (attempt $i)"
            if [ "$STATUS" = "Online" ]; then break; fi
            sleep 15
          done

          if [ "$STATUS" != "Online" ]; then
            echo "ERROR: SSM agent not online"
            exit 1
          fi

          # Write pub key to a temp file, upload via SSM parameter store to avoid
          # shell quoting issues with base64 expansion inside SSM JSON
          B64_KEY=$(printf '%s' "$SSH_PUBLIC_KEY" | base64 -w0)

          CMD_ID=$(aws ssm send-command \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=['set -e','mkdir -p /home/ec2-user/.ssh','chmod 700 /home/ec2-user/.ssh','echo ${B64_KEY} | base64 -d > /home/ec2-user/.ssh/authorized_keys','chmod 600 /home/ec2-user/.ssh/authorized_keys','chown -R ec2-user:ec2-user /home/ec2-user/.ssh']" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM command ID: $CMD_ID"
          for i in $(seq 1 20); do
            CMD_STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "${INSTANCE_ID}" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            echo "  Command status: $CMD_STATUS (attempt $i)"
            if [ "$CMD_STATUS" = "Success" ]; then break; fi
            if [ "$CMD_STATUS" = "Failed" ] || [ "$CMD_STATUS" = "TimedOut" ] || [ "$CMD_STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation \
                --command-id "$CMD_ID" \
                --instance-id "${INSTANCE_ID}" \
                --query "StandardErrorContent" --output text
              exit 1
            fi
            sleep 10
          done
          echo "SSH public key injected successfully."
      - name: Load SSH key into agent and run Ansible
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          # Start ssh-agent and add the private key.
          # Using ssh-agent avoids all PEM file formatting issues (\n vs newline).
          eval "$(ssh-agent -s)"

          # The platform may store the key with literal \n or real newlines.
          # We handle both: first try direct add; if the key has \n literals, convert.
          KEY_FILE=$(mktemp)
          chmod 600 "$KEY_FILE"
          # Write with printf (preserves real newlines)
          printf '%s' "$SSH_PRIVATE_KEY" > "$KEY_FILE"
          # If the file is a single line (no real newlines in PEM body), convert \n literals
          LINE_COUNT=$(wc -l < "$KEY_FILE")
          if [ "$LINE_COUNT" -lt 3 ]; then
            printf '%s' "$SSH_PRIVATE_KEY" | sed 's/\\n/\n/g' > "$KEY_FILE"
          fi
          ssh-add "$KEY_FILE"
          rm -f "$KEY_FILE"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "${{ needs.provision.outputs.ec2_ip }}" >> ~/.ssh/known_hosts 2>/dev/null

          RDS_ENDPOINT=$(cat /tmp/rds_endpoint.txt)
          ansible-playbook -i "${{ needs.provision.outputs.ec2_ip }}," \
            -u "${{ secrets.SSH_USER }}" \
            -e "rds_endpoint=${RDS_ENDPOINT}" \
            -e "db_password=${{ secrets.DB_PASSWORD }}" \
            -e "project_name=${{ secrets.PROJECT_NAME }}" \
            ansible/playbook.yml

  verify:
    runs-on: ubuntu-latest
    needs: [configure, provision]
    steps:
      - name: Download RDS endpoint artifact
        uses: actions/download-artifact@v4
        with:
          name: rds-endpoint
          path: /tmp
      - name: Health check
        run: |
          curl --fail --retry 10 --retry-delay 15 --retry-all-errors \
            http://${{ needs.provision.outputs.ec2_ip }}/health
