# Auto-rendered from .udap/pipeline.yaml — do not edit directly
name: myshortner02

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: flake8 app/ --max-line-length=120 --exclude=app/migrations

  provision:
    runs-on: ubuntu-latest
    needs: [lint]
    outputs:
      ec2_ip: ${{ steps.tf_outputs.outputs.ec2_ip }}
      ec2_id: ${{ steps.tf_outputs.outputs.ec2_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
      - name: Terraform Init
        run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" -backend-config="key=myshortner02/terraform.tfstate" -backend-config="region=us-east-1"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        working-directory: infra
      - name: Import existing resources
        run: |
          chmod +x import_existing.sh
          bash import_existing.sh "${{ secrets.PROJECT_NAME }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          TF_VAR_project_name: ${{ secrets.PROJECT_NAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        working-directory: infra
      - name: Terraform Apply
        run: terraform apply -auto-approve -var="db_password=${{ secrets.DB_PASSWORD }}" -var="project_name=${{ secrets.PROJECT_NAME }}" -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        working-directory: infra
      - name: Capture Outputs
        id: tf_outputs
        run: |
          EC2_IP=$(terraform output -json | jq -r '.ec2_public_ip.value')
          EC2_ID=$(terraform output -json | jq -r '.ec2_instance_id.value')
          RDS_EP=$(terraform output -json | jq -r '.rds_endpoint.value')
          echo "ec2_ip=${EC2_IP}" >> "$GITHUB_OUTPUT"
          echo "ec2_id=${EC2_ID}" >> "$GITHUB_OUTPUT"
          # Write RDS endpoint to artifact file — GitHub masks job outputs that
          # contain substrings matching registered secrets.
          echo -n "${RDS_EP}" > /tmp/rds_endpoint.txt
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        working-directory: infra
      - name: Upload RDS endpoint artifact
        uses: actions/upload-artifact@v4
        with:
          name: rds-endpoint
          path: /tmp/rds_endpoint.txt
          retention-days: 1

  configure:
    runs-on: ubuntu-latest
    needs: [provision]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Ansible
        run: pip install ansible
      - name: Download RDS endpoint artifact
        uses: actions/download-artifact@v4
        with:
          name: rds-endpoint
          path: /tmp
      - name: Write SSH key
        run: |
          install -m 600 /dev/null /tmp/deploy_key
          printf '%s\n' "$SSH_PRIVATE_KEY" > /tmp/deploy_key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Inject SSH public key via SSM (authoritative, no SSH needed)
        # This step uses AWS SSM Run Command to write the current SSH_PUBLIC_KEY
        # into ec2-user's authorized_keys on the running instance.
        # This works regardless of what key the instance was launched with and
        # does not require SSH connectivity — only SSM agent (pre-installed on AL2023).
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          INSTANCE_ID="${{ needs.provision.outputs.ec2_id }}"
          echo "Injecting SSH public key into instance $INSTANCE_ID via SSM"

          # Wait for SSM agent to be reachable (it may be starting up)
          for i in $(seq 1 20); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${INSTANCE_ID}" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null || echo "")
            echo "  SSM ping status: $STATUS (attempt $i)"
            if [ "$STATUS" = "Online" ]; then break; fi
            sleep 15
          done

          if [ "$STATUS" != "Online" ]; then
            echo "ERROR: SSM agent not online after 5 minutes"
            exit 1
          fi

          # Encode the public key as base64 to safely pass it as a command argument
          B64_KEY=$(printf '%s' "$SSH_PUBLIC_KEY" | base64 -w0)

          CMD_ID=$(aws ssm send-command \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'mkdir -p /home/ec2-user/.ssh',
              'chmod 700 /home/ec2-user/.ssh',
              'echo ${B64_KEY} | base64 -d > /home/ec2-user/.ssh/authorized_keys',
              'chmod 600 /home/ec2-user/.ssh/authorized_keys',
              'chown -R ec2-user:ec2-user /home/ec2-user/.ssh'
            ]" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM command ID: $CMD_ID"

          # Poll until the command completes
          for i in $(seq 1 15); do
            CMD_STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "${INSTANCE_ID}" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            echo "  Command status: $CMD_STATUS (attempt $i)"
            if [ "$CMD_STATUS" = "Success" ]; then break; fi
            if [ "$CMD_STATUS" = "Failed" ] || [ "$CMD_STATUS" = "TimedOut" ] || [ "$CMD_STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation \
                --command-id "$CMD_ID" \
                --instance-id "${INSTANCE_ID}" \
                --query "StandardErrorContent" \
                --output text
              echo "ERROR: SSM command failed"
              exit 1
            fi
            sleep 10
          done

          echo "SSH public key successfully injected via SSM."
      - name: Scan host key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "${{ needs.provision.outputs.ec2_ip }}" >> ~/.ssh/known_hosts
      - name: Run Ansible playbook
        run: |
          RDS_ENDPOINT=$(cat /tmp/rds_endpoint.txt)
          ansible-playbook -i "${{ needs.provision.outputs.ec2_ip }}," \
            --private-key /tmp/deploy_key \
            -u "${{ secrets.SSH_USER }}" \
            -e "rds_endpoint=${RDS_ENDPOINT}" \
            -e "db_password=${{ secrets.DB_PASSWORD }}" \
            -e "project_name=${{ secrets.PROJECT_NAME }}" \
            ansible/playbook.yml

  verify:
    runs-on: ubuntu-latest
    needs: [configure, provision]
    steps:
      - name: Download RDS endpoint artifact
        uses: actions/download-artifact@v4
        with:
          name: rds-endpoint
          path: /tmp
      - name: Health check
        run: |
          curl --fail --retry 10 --retry-delay 15 --retry-all-errors \
            http://${{ needs.provision.outputs.ec2_ip }}/health
